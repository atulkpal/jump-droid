name: Campaign Processor
on:
  schedule:
    - cron: "0 * * * *"
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger campaign processor
        run: |
          curl -s -X POST "${{ secrets.CAMPAIGN_PROCESSOR_URL }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
